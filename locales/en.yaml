---
language_name: '🇺🇸 English'
name: fStik — Stickers & Emoji
description:
  long: |
    Create stickers and emoji from photos, videos, and GIFs. No manual conversion — bot handles everything. Easier than @Stickers.

    Features:
    • Easy pack management
    • Video stickers & custom emoji
    • Download original files
    • Convert sticker/video/GIF to image
    • Sticker catalog

    Search stickers: play.google.com/store/apps/details?id=app.fstik 🇺🇦
  short: |
    Create stickers and emoji from photos, videos, GIFs. Sticker catalog and search. 🇺🇦
ratelimit: Not so often!
