        Կարող եք աջակցել բոտի զարգացմանը (/donate)՝ բարձրացնելով մշակման գործընթացի առաջնահերթությունը և ավելացնել մեկից ավելի ստիկեր հերթին:
      timeout: |
        <b>Այս պահին բոտը մեծ ծանրաբեռնվածություն է ապրում</b>
        Հետևաբար, վիդեո փոխակերպումը հասանելի է միայն ակտիվ խթանմամբ փաթեթների համար

        Մանրամասների համար հետևեք / նվիրաբերել
