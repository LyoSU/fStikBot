      Ցանկանու՞մ եք ավելացնել <a href="${link}">${title}</a> -ը հանրային սթիքերների կատալոգում, որպեսզի բոտի մյուս օգտվողները նույնպես տեսնեն այն:
      <i>Շատ ժամանակ չի խլում</i>
