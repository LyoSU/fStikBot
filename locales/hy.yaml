coedit:
  info: |
    <b>👥 Համախմբագիրում:</b>

    Համախմբագրման հղումը <a href="${link}">${title}</a>: <code>${colink}</code>

    <b>Ինչպես օգտագործել:</b>
    1. Ուղարկեք հղումը մարդուն, ում ուզում եք տալ հասանելիություն փաթեթին
    2. Հղմանը սեղմելուց հետո, նրանք պետք է սեղմեն «սկսել» և նրանք կավելացվեն խմբագիրների մեջ
    3. Խմբագիրը կարող է ավելացնել, հեռացնել և խմբագրել սթիքերները փաթեթում

    <b>Խմբագիրներ:</b>
    ${editors}

    <i>Խմբագիրներին հեռացնելու համար անհրաժեշտ է նորացնելու հղումը</i>
  no_editors: |
    Խմբագիրներ դեռ չկան
  btn:
    send: '📤 Ուղարկեք հղումը'
    reset: '🔁 Վերականգնել հղումը'
  share: |
    Հետևեք հղմանը և սեղմեք «սկսել»՝ փաթեթը համատեղ խմբագրելու համար «${title}»
  reset: |
    <b>🔁 Հղման վերակայումը հաջողվեց</b>

    Նոր հղում <a href="${link}">${title}</a>՝
    <code>${colink}</code>
