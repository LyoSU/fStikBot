      sticker_not_found: |
        <b>Սխալ!</b>

        Այս ստիկերը չի գտնվել: Խնդրում ենք համոզվել, որ այն ճիշտ փաթեթում է կամ կրկին փորձեք ավելացնել այն։
      invalid_image: |
