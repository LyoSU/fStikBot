  guide:
    web: |
      <b>📖 Як користуватись fStikBot</b>

      Повні гайди, поради та FAQ на нашому сайті.
    menu: |
      <b>❓ Допомога</b>

      Обери тему:
    create: |
      <b>🎨 Створення стікерів</b>

      1. Надішли /new щоб створити пак
      2. Обери тип: звичайний, відео або емодзі
      3. Надсилай фото, відео чи GIF
      4. Готово! Бот сам все конвертує

      <b>Корисні команди:</b>
      • /clear — видалити фон з фото
      • /round — зробити кружок з відео
      • /frame — форма відео-стікера:
        └ lite, medium, rounded, square, circle

      <b>💡 Порада:</b> Надсилай PNG як <b>Файл</b> (📎) щоб зберегти прозорість. Режим «Фото» стискає і прибирає її.
    manage: |
      <b>📁 Керування паками</b>

      <b>Команди:</b>
      • /packs — список твоїх паків
      • /delete — видалити стікер
      • /copy — скопіювати пак
      • /restore — повернути приховані паки
      • /original — знайти оригінал стікера
      • /about — інфо про пак та автора

      <b>Змінити емодзі:</b>
      Надішли стікер → надішли новий емодзі.
      Або надішли емодзі одразу після додавання.

      <b>Емодзі за замовчуванням:</b>
      /emoji 🔥 — всі нові стікери матимуть цей.

      <b>В групах:</b>
      /ss (у відповідь на медіа) — швидке додавання до групового паку.

      <b>Інлайн-паки:</b>
      Окремий тип паків для швидкого доступу через @ім'я_бота в будь-якому чаті.
      • Не справжній Telegram пак — зберігається тільки в боті
      • Може містити стікери, фото, GIF, відео
      • Створи в /packs → вкладка «Інлайн»
      • Також є режим пошуку GIF (через Tenor)

      <b>Спільне редагування (Co-edit):</b>
      Натисни на пак → Co-edit → отримай посилання.
      Будь-хто з посиланням може додавати/видаляти стікери.
      Скинь посилання щоб прибрати всіх редакторів.

      <b>Опції паку:</b>
      Натисни на пак в /packs → перейменувати, буст, спільне редагування, видалити.
    catalog: |
      <b>🔍 Каталог</b>

      • /catalog — популярні паки
      • /publish — опублікувати свій пак
      • Оцінюй паки щоб просувати круті
    boost: |
      <b>⚡ Буст</b>

      • Без "${titleSuffix}" у назві
      • Пріоритетна обробка відео
      • Відео до 30 сек
      • Кілька стікерів в чергу

      <b>Секрет:</b> /new fill — адаптивні емодзі (змінюють колір під текст)

      Отримати → /donate
    problems: |
      <b>❓ FAQ</b>

      <b>⚫ Фон став чорним?</b>
      Телеграм прибирає прозорість, якщо надіслати як «Фото».
      → Надсилай PNG як <b>Файл</b> (📎 скріпка).

      <b>🔄 Зміни не видно?</b>
      Телеграм кешує стікери. Зачекай ~1 годину або перезапусти додаток.

      <b>📹 Відео не анімується?</b>
      Скоріш за все дивний формат. Спробуй конвертувати в MP4 або надіслати як Файл замість Відео.

      <b>🗑 Як видалити стікер?</b>
      Надішли /delete, потім натисни на стікер.

      <b>🤏 Стікер замалий?</b>
      Обріж картинку до квадрата (1:1) перед надсиланням.

      <b>🔗 Як прибрати "_by_fStikBot" з посилання?</b>
      Ніяк. Телеграм вимагає цей суфікс щоб визначити, яким ботом створено пак. Це правило платформи, не наше.

      <b>💎 Потрібен Premium?</b>
      • Створювати паки: безкоштовно
      • Використовувати стікери: безкоштовно
      • Надсилати кастомні емодзі: тільки Premium (правило Telegram)

      <b>Ще питання?</b> @fStikCommunity
