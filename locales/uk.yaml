---
language_name: '🇺🇦 Українська'
name: fStik — Стікери та емодзі
description:
  long: |
    Створюй стікери та емодзі з фото, відео і GIF. Без ручної конвертації — бот зробить все сам. Простіше, ніж @Stickers.

    Можливості:
    • Керування паками
    • Відео-стікери та кастомні емодзі
    • Завантаження оригіналів
    • Конвертація стікера/відео/GIF у картинку
    • Каталог стікерів

    Пошук стікерів: play.google.com/store/apps/details?id=app.fstik 🇺🇦
  short: |
    Створюй стікери та емодзі з фото, відео, GIF. Каталог і пошук стікерів. 🇺🇦
ratelimit: Занадто часто!
