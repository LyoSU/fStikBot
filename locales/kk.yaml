      • Бір стикерге бірнеше эмодзи қосу
      • Формат: 😀,😊,🙂

      /frame - Бейне кадрларын баптау
      • Тек бейне стикерлер үшін қол жетімді
      • Кадр түрлері: жеңіл, орташа, дөңгеленген, квадрат, шеңбер
      • Тұтас топтама үшін өзгертіле алады

      <b>📁 Топтама Басқару</b>

      /packs - Топтамаларыңызды басқару
