        <b>Қате!</b>
        Бот ағымдағы таңдалған бумаға қол жеткізе алмайды.

        Басқа буманы (/жаңа) жасаңыз немесе (/бумаларды) таңдаңыз.
      invalid_png: |
        <b>Қате!</b>
