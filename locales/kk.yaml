          Бұл фотосуретті немесе статикалық стикерді статикалық бумаға қосуға болады

          <i>Жасау (/жаңа) немесе таңдау (/пакеттер) басқа пакет</i>
        video: |
          <b>Қате!</b>
          Бұл файл түріне қолдау көрсетілмейді
          Бұл бейне файлдарын бейне бумасына қосуға болады

          <i>Жасау (/жаңа) немесе таңдау (/ пакеттер) басқа пакет</i>
        animated: |
          <b>Қате!</b>
          Бұл файл түріне қолдау көрсетілмейді
          Бұл анимациялық файлдарды векторлық бумаға қосуға болады

          <i>Жасау (/жаңа) немесе (/) таңдаңыз. пакеттер) басқа пакет</i>
        unknown: |
          <b>Қате!</b>
          Бұл файл түріне қолдау көрсетілмейді

          <i>Жасау (/жаңа) немесе басқа буманы (/бумаларды) таңдаңыз</i>
      wait_load: |
        <b>Күтіңіз!</b>

        Бот алдыңғы файлды әлі өңдеп жатыр...
        Өңдеу басымдығын арттыру және кезекке бірден көп стикер қосу мүмкіндігін алу үшін ботты қолдауыңызға болады (\/donate).
      timeout: |
        <b>Қазіргі уақытта бот үлкен жүктемені бастан кешіруде</b>
        Сондықтан, бейне түрлендіру тек белсенді күшейткіші бар бумалар үшін қол жетімді

        Қосымша мәліметтер алу үшін / садақа беру
      convert: |
        <b>Қате!</b>
        Өкінішке орай, бот бейнеңізді түрлендіре алмады.

        Бейнеңіз ботқа түсініксіз форматта сақталған болуы мүмкін. Оның mp4 пішімінде екеніне көз жеткізіңіз.
        Бұл боттың ішкі қатесі де болуы мүмкін, бұл бейнені қайта жіберіп көріңіз.
      too_big: |
        <b>Қате!</b>.

        Файл өңдеу үшін тым үлкен. Жіберер алдында сапасы мен ұзақтығын азайтыңыз.
      sticker_not_found: |
        <b>Қате!</b>

        Бұл стикер табылмады. Оның дұрыс пакте екеніне көз жеткізіңіз немесе қайта қосып көріңіз.
      invalid_image: |
        <b>Error!</b>

