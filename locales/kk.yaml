sticker:
  add:
    ok: |
      <b>Сәтті түсірілді:</b>
      <a href="${link}">${title}</a>

      Бұл стикердiң барлығынан кейін, бұл набор барлық пайдаланушылар үшін жаңартылады.

      <i>Егер оларды қосу керек болса, стикермен байланысты бір-немесе бірнеше эмоджи жіберу</i>
    ok_inline: |
      <b>Бумаға сәтті қосылды:</b>
      <u>${title}</u>
    send_emoji: Керемет, енді сәйкес келетін эмодзиді жіберіңіз
    converting_process: |
      <b>Күте тұрыңыз...</b>
      Файлыңыз түрлендіру кезегінде тұр. Аяқтауды күтіңіз. Бұл біраз уақыт алуы мүмкін.

      Барысы: ${progress} / ${total}

      <i>Ботқа қолдау көрсеткен пайдаланушылар кезекте басымдыққа ие болады (толығырақ: /қайырымдылық)</i>
    catalog_offer: |
      <b>😲 Уау, керемет пакет жасадың!</b>

      Боттың басқа пайдаланушылары да көре алуы үшін жалпыға ортақ стикерлер каталогына <a href="${link}">${title}</a> қосқыңыз келе ме?
      <i>Бұл көп уақытты алмайды</i>
    quote: |
      Бұл хабарламадан дәйексөз жасау үшін @QuotlyBot пайдаланыңыз
    error:
      reply: |
        <b>Қате!</b>
        Стикерге жауап беріңізші.
      no_selected_pack: |
        <b>Сіз буманы таңдамадыңыз</b>

        Буманы жасаңыз (/жаңа) немесе (/бумалар) таңдаңыз
