---
language_name: '🇷🇺 Русский'
name: fStik — Стикеры и эмодзи
description:
  long: |
    Создавай стикеры и эмодзи из фото, видео и GIF. Без ручной конвертации — бот сделает всё сам. Проще, чем @Stickers.

    Возможности:
    • Управление паками
    • Видео-стикеры и кастомные эмодзи
    • Скачивание оригиналов
    • Конвертация стикера/видео/GIF в картинку
    • Каталог стикеров

    Поиск стикеров: play.google.com/store/apps/details?id=app.fstik 🇺🇦
  short: |
    Создавай стикеры и эмодзи из фото, видео, GIF. Каталог и поиск стикеров. 🇺🇦
ratelimit: Не так часто!
cmd:
  start:
    enter: |
      Привет, ${name}!
      Создаю стикеры и эмодзи из фото, видео и GIF.

      💬 @fStikCommunityRU
    group: |
      Привет, ${groupTitle}! Я создаю стикеры и эмодзи.

      Чтобы добавить стикер в групповой пак, используй /ss в ответ на фото, видео, гифку или стикер.
    catalog: |
      <b>🔍 Каталог стикеров</b>

      Ищи паки по ключевым словам или смотри популярные.
      Оценивай чтобы помочь другим найти крутые паки.
    search_catalog: |
      <b>🌐 Каталог паков</b>

      Смотри паки других или публикуй свои:
    commands:
      ss: '🌟 Сохранить стикер'
      start: '📜 Меню'
      help: '❓ Помощь'
      packs: '📁 Мои паки'
      new: '➕ Новый пак'
      search_catalog: '🌐 Каталог'
      catalog: '🌐 Каталог'
      publish: '📤 Опубликовать'
