      user_about: '👤 Об авторе'
      lang: '🌐 Язык'
      report: '🚨 Жалоба'
      donate: '⭐ Поддержать'
      add_to_group: '👥 Добавить в группу'
      privacy: '🔒 Приватность'
      guide: '❓ Помощь'
    btn:
      new: '➕ Новый пак'
      catalog: '🔍 Каталог'
      catalog_mini: '🔍 Каталог'
      catalog_browser: '🌐 Открыть в браузере'
      catalog_browser_mini: '🌐 В браузере'
      catalog_app: '📱 Скачать Android приложение'
      catalog_app_mini: '📱 Android приложение'
  guide:
    menu: |
      <b>📖 Как пользоваться</b>

      Выбери тему:
    create: |
      <b>🎨 Создание стикеров</b>

      1. Отправь /new чтобы создать пак
      2. Выбери тип: обычный, видео или эмодзи
      3. Отправляй фото, видео или GIF
      4. Готово! Бот сам всё конвертирует

      <b>Полезные команды:</b>
      • /clear — удалить фон с фото
      • /round — сделать кружок из видео
      • /frame — форма видео-стикера:
        └ lite, medium, rounded, square, circle

      <b>💡 Совет:</b> Отправляй PNG как <b>Файл</b> (📎) чтобы сохранить прозрачность. Режим «Фото» сжимает и убирает её.
    manage: |
      <b>📁 Управление паками</b>

      <b>Команды:</b>
      • /packs — список твоих паков
      • /delete — удалить стикер
      • /copy — скопировать пак
      • /restore — вернуть скрытые паки
      • /original — найти оригинал стикера
      • /about — инфо о паке и авторе

      <b>Изменить эмодзи:</b>
      Отправь стикер → отправь новый эмодзи.
      Или отправь эмодзи сразу после добавления.

      <b>Эмодзи по умолчанию:</b>
      /emoji 🔥 — все новые стикеры получат этот.

      <b>В группах:</b>
      /ss (в ответ на медиа) — быстрое добавление в групповой пак.

      <b>Inline паки (Для поиска):</b>
      Отдельный тип паков для быстрого доступа через @имя_бота в любом чате.
      • Не настоящий Telegram пак — хранится только в боте
      • Может содержать стикеры, фото, GIF, видео
      • Создай в /packs → вкладка «Для поиска»
      • Также есть режим поиска GIF (через Tenor)

      <b>Совместное редактирование (Co-edit):</b>
      Нажми на пак → Co-edit → получи ссылку.
      Любой с ссылкой может добавлять/удалять стикеры.
      Сбрось ссылку чтобы убрать всех редакторов.

      <b>Опции пака:</b>
      Нажми на пак в /packs → переименовать, буст, совместное редактирование, удалить.
    catalog: |
      <b>🔍 Поиск и публикация</b>

      • /catalog — смотри популярные паки
      • /publish — поделись своим паком публично
      • Оценивай паки ⭐ чтобы помочь другим найти крутые

      Хорошие паки получают больше просмотров. Твой может стать вирусным 🔥
    boost: |
      <b>⚡ Буст и дополнительные возможности</b>

      <b>Преимущества буста:</b>
      • Без "${titleSuffix}" в названии пака
      • Приоритетная обработка видео
      • Более длинные видео (до 30 сек)
      • Добавляй несколько стикеров сразу

      <b>Скрытая фича:</b>
      /new fill — создать адаптивные эмодзи (меняют цвет под текст).

      Получить буст → /donate
    problems: |
      <b>❓ FAQ</b>

      <b>⚫ Фон стал чёрным?</b>
      Телеграм убирает прозрачность, если отправить как «Фото».
      → Отправляй PNG как <b>Файл</b> (📎 скрепка).

      <b>🔄 Изменения не видны?</b>
      Телеграм кеширует стикеры. Подожди ~1 час или перезапусти приложение.

      <b>📹 Видео не анимируется?</b>
      Скорее всего странный формат. Попробуй конвертировать в MP4 или отправить как Файл вместо Видео.

      <b>🗑 Как удалить стикер?</b>
      Отправь /delete, потом нажми на стикер.

      <b>🤏 Стикер слишком маленький?</b>
      Обрежь картинку до квадрата (1:1) перед отправкой.

      <b>🔗 Как убрать "_by_fStikBot" из ссылки?</b>
      Никак. Телеграм требует этот суффикс чтобы определить, каким ботом создан пак. Это правило платформы, не наше.

      <b>💎 Нужен Premium?</b>
      • Создавать паки: бесплатно
      • Использовать стикеры: бесплатно
      • Отправлять кастомные эмодзи: только Premium (правило Telegram)

      <b>Ещё вопросы?</b> @fStikCommunity
    btn:
      create: '🎨 Создание стикеров'
      manage: '📁 Управление паками'
      catalog: '🔍 Поиск и публикация'
      boost: '⚡ Буст и возможности'
