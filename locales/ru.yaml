  help: |
    <b>🧑‍🎨 О пользователе</b>

    С помощью этого меню ты можешь узнать информацию о пользователе и его стикерпаках

    Чтобы получить информацию о пользователе, воспользуйся кнопкой ниже или перешли его сообщение
  result: |
    <b>🧑‍🎨 Информация о пользователе</b>
    <b>🆔 ID пользователя:</b> <code>${userId}</code>
    <b>🎨 Паки от этого пользователя:</b>
    ${packs}
  no_packs: |
    <i>У нас нет информации о паках этого владельца</i>
  forward_hidden: |
    Пользователь скрыл возможность пересылать сообщения. Воспользуйся кнопкой ниже, чтобы просмотреть его стикерпаки.
  select_user: '🧑‍🎨 Выбрать пользователя'
scenes:
  new_pack:
    pack_type: |
      <b>Тип пака:</b>
    regular: '🖼 Стикеры'
    custom_emoji: '✨ Эмодзи'
    static: '🖼 Обычный'
    animated: '✨ Анимированный'
    video: '📹 Видео'
    pack_format: |
      <b><u>Выбери тип пака</u></b>

      <b>Обычный</b> — статичные стикеры из картинок. PNG, JPG, WEBP.
      Пример: t.me/addstickers/Animals

      <b>Анимированный</b> — плавная анимация. Нужны специальные .TGS файлы.
      Пример: t.me/addstickers/IsabelleShizue

      <b>Видео</b> — из видео, GIF или фото. Самый популярный.
      Пример: t.me/addstickers/TheMascot

      <i>Видео и анимированные — до 50 стикеров. Обычные — до 120.</i>
    pack_title: |
      <b>Название пака:</b>
    pack_name: |
      <b>Короткая ссылка:</b>

      Пример: t.me/addstickers/<u>MoiStikery</u>
    ok: |
      ✅ Пак создан: <a href="${link}">${title}</a>

      Отправь фото, видео или стикер чтобы добавить.
    error:
      title_long: Название не должно быть длиннее ${max} символов.
      name_long: Адрес не должен быть длиннее ${max} символов.
      telegram:
        name_invalid: Такой адрес использовать не получится.
        name_occupied: Этот адрес уже занят. Попробуй другой.
        upload_failed: |
          <b>Ошибка!</b>
          Бот не может загрузить стикеры в Telegram.

          Попробуй позже.
  copy:
    enter: |
      Сначала создадим новый пак для копии.
    progress: |
      ⏳ Копирую: ${current}/${total}
    done: |
      ✅ Скопировано в <a href="${link}">${title}</a>
    done_partial: |
      ⚠️ Скопировано в <a href="${link}">${title}</a>

      ${success} стикеров скопировано, ${failed} не удалось скопировать.
    done_pending: |
      ✅ Скопировано в <a href="${link}">${title}</a>

      ${success} стикеров скопировано, ${pending} видео ещё обрабатываются.
    done_partial_pending: |
      ⚠️ Скопировано в <a href="${link}">${title}</a>

      ${success} стикеров скопировано, ${failed} не удалось, ${pending} видео ещё обрабатываются.
    pay: |
      <b>Конвертация пака</b>

      Конвертация пака из одного типа в другой стоит 1 Кредит

      <b>Текущий баланс:</b> ${balance} Кредитов

      Купить Кредиты: /donate
    pay_btn: '✅ Подтвердить'
    error:
      all_failed: |
        ❌ Не удалось скопировать ни одного стикера из <a href="${originalLink}">${originalTitle}</a>.

        Пак не создан.
      premium: |
        <b>Ошибка!</b>
        К сожалению, эта функция доступна только для тех, кто поддержал бота.

        Ты можешь это сделать, отправив команду /donate.
  original:
    enter: |
      <b>🔎 Откуда стикер</b>

      Отправь стикер — покажу из какого пака он скопирован.
      Если оригинал не найден — получишь файл (PNG/WEBM).
    error:
      not_found: |
        Оригинал не найден. Вот файл стикера:
  delete:
    enter: |
      <b>🗑 Удаление стикера</b>

      Отправь стикер, который хочешь удалить из пака.
    confirm: |
      Удалить этот стикер из пака?
    error:
      not_found: |
        Стикер не найден в базе. Возможно, он создан не через этого бота.
  rename:
    enter_name: |
      Новое название для <a href="${link}">${title}</a>:
    success: |
      ✅ Переименовано: <a href="${link}">${title}</a>
    boost_notice: |
      Буст уберёт "${titleSuffix}" → /donate
  packAbout:
    enter: |
      <b>🔎 Чей стикер</b>

      Отправь стикер — покажу пак, автора и другие его паки.
      Или перешли сообщение — покажу паки этого человека.
    not_found: |
      Стикер не найден.
    btn:
      download: '📎 Скачать файл'
      show_all_packs: '📦 Все паки (${count})'
    result: |
      <b>📦 Пак:</b> <a href="${link}">${name}</a>
      🔢 Стикеров: <code>${stickerCount}</code> | 🏷 #<code>${setId}</code> | ${dcId}

      🧑‍🎨 ID владельца: <code>${ownerId}</code>
      ${mention}

      <b>🎨 Другие паки от этого владельца:</b>
      ${otherPacks}
    no_other_packs: |
      <i>У нас нет информации о других паках этого владельца</i>
    unknown_owner: '<i>Неизвестно</i>'
    hidden: '<i>[скрыто]</i>'
  boost:
    sure: |
      Бустнуть <a href="${link}">${title}</a>?

      <b>Цена:</b> 1 кредит
      <b>Баланс:</b> ${balance}
    btn:
      yes: '⚡ Бустнуть'
      no: Отмена
    canceled: |
      Отменено
    success: |
      ⚡ ${title} бустнут!
    error:
      not_enough_credits: |
        Недостаточно кредитов. /donate
      already_boosted: |
        Уже бустнут.
  catalog:
    publish:
      publish_new: |
        👌 <b>Отправь стикер из пака, который хочешь опубликовать</b>

        <i>Можешь опубликовать любой свой пак, даже созданный в другом месте</i>
      owner_proof: |
        <b>Чтобы подтвердить владение этим паком, выполни несколько простых шагов:</b>
        1. Открой бота @Stickers
        2. Отправь команду <code>/packstats</code>
        3. Найди и выбери нужный пак
        4. Перешли полученное сообщение мне
      publish_new_access_denied: |
        <b>Ошибка!</b>
        Это не твой пак.

        Можно публиковать только свои паки
      banned: |
        <b>Ошибка!</b>
        Тебе запрещено использовать эту функцию.
        Свяжись с администратором.
      enter: |
        Опубликовать <a href="${link}">${title}</a> в каталоге?

        Другие пользователи смогут найти твой пак по названию или тегам.

        <b>Правила:</b>
        • Только качественные паки для широкой аудитории
        • Без личных фото или приватного контента
        • Без нарушения законов
      continue_button: Продолжить
      enter_description: |
        <b>Кратко опиши свой пак, чтобы другие могли его найти</b>

        <i>Можешь использовать хэштеги для категоризации [#]</i>
        <i>Например: #аниме #мемы #животные #cute #kpop #funny #кошки #game</i>
      select_language: |
        <b>Выбери языки, для которых предназначен твой пак:</b>
        <i>Можно выбрать несколько</i>
      button_all_languages: Любой язык
      button_confirm_language: Подтвердить
      set_safe: |
        <b>Твой пак безопасен для пользователей?</b>
        <i>То есть не содержит эротики и другого шокирующего контента</i>
      button_safe:
        safe: Да, безопасен
        not_safe: Нет, небезопасен
      no_tags: не указаны
      confirm: |
        <b>Подтвердить публикацию стикерпака «<a href="${link}">${title}</a>»</b>

        <b>Описание:</b> <i>${description}</i>

        <b>Теги:</b> ${tags}
        <b>Языки:</b> ${languages}
      button_confirm: '✅ Подтвердить публикацию'
      success: |
        Поздравляю! Твой пак опубликован в каталоге, теперь его смогут найти другие пользователи!

        Редактировать информацию о паке можно через /packs.

        <i>Статистику своего пака можно посмотреть через официального бота @Stickers</i>
    unpublish:
      success: |
        Пак успешно удалён из каталога.
  delete_pack:
    enter: |
      ⚠️ Удалить <a href="${link}">${title}</a> навсегда?

      Отправь <code>${confirm}</code> для подтверждения.
    confirm: Да, удалить
    success: |
      🗑 Пак удалён
    error:
      - Что-то пошло не так.
  frame:
    no_video: |
      <b>Ошибка!</b>
      Рамку можно установить только для видеопаков.
    select_type: |
      <a href="${example}">&#8203;</a><b>Выбери тип рамки:</b>
      Рамка — прозрачный фон вокруг стикера

      <code>лёгкая</code> — углы слегка закруглены
      <code>средняя</code> — углы умеренно закруглены
      <code>закруглённая</code> — углы сильно закруглены
      <code>квадратная</code> — прямоугольная форма без закругления
      <code>круглая</code> — стикер в форме круга

      <i>Изменить рамку можно командой /frame</i>
    types:
      lite: '1. Лёгкая'
      medium: '2. Средняя'
      rounded: '3. Закруглённая'
      square: '4. Квадратная'
      circle: '5. Круглая'
    selected: |
      <b>Выбран тип рамки:</b> ${type}
  photoClear:
    enter: |
      <b>✂️ Удаление фона</b>

      Отправь фото — получишь PNG без фона.
      <i>Лучше работает с фото людей.</i>
    enter_anime: |
      <b>✂️ Удаление фона</b>

      Отправь фото — получишь PNG без фона.
      <i>Лучше работает с аниме.</i>
    choose_model: |
      Модель:
    web_app: WebApp — для фото с людьми
    model:
      ordinary: Обычная — для фото с людьми
      general: Общая — для любых фото
      anime: Аниме — для аниме-картинок
      birefnet_general: BirefNet — для любых фото
    add_to_set_btn: '🌟 Добавить в пак'
    error: |
      Что-то пошло не так. Попробуй снова.
  videoRound:
    enter: |
      <b>⭕ Видео в кружок</b>

      Отправь видео — сделаю из него кружок.
    not_video: |
      Отправь видео, GIF, видеостикер или анимированное изображение.
    error: |
      Не удалось конвертировать. Попробуй другое видео.
    forbidden: |
      Не могу отправить тебе кружок. Проверь настройки приватности (голосовые сообщения должны быть разрешены).
    processing: |
      ⏳ Конвертирую: ${position}/${total}

      <i>Буст = приоритет → /donate</i>
    file_too_big: |
      Файл слишком большой (макс. 20 МБ). Отправь видео поменьше.
  search:
    enter: |
      <b>🔍 Поиск стикеров</b>

      Введи ключевые слова — найду паки в каталоге.
  leave: |
    Отменено
  btn:
    cancel: '← Отмена'
error:
  telegram: |
    Ошибка Telegram: <code>${error}</code>
  answerCbQuery:
    telegram: |
      Ошибка: ${error}
  file_too_big: |
    Файл слишком большой (макс. 20 МБ).
  download: |
    Не удалось загрузить файл. Попробуй ещё раз.
  banned: |
    🚫 Доступ запрещён. Вопросы → @ly_oBot
  access_denied: Доступ запрещён
  unknown: |
    Что-то пошло не так. Попробуй снова.

    Не помогает? Пиши @Ly_oBot
  rate_limit: |
    ⏳ Слишком много запросов. Подожди немного и попробуй снова.
  rate_limit_seconds: |
    ⏳ Слишком много запросов. Подожди ${seconds} секунд.
