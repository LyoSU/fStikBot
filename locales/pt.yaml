name: fStik — Figurinhas e Emoji
description:
  long: |
    Crie stickers e emojis de fotos, vídeos e GIFs sem conversão manual. Tudo é processado automaticamente.

    Recursos:
    • Gerenciamento de pacotes
    • Stickers de vídeo e emoji personalizados
    • Baixar arquivos originais
    • Converter para imagem
    • Catálogo de stickers

    Pesquise adesivos: play.google.com/store/apps/details?id=app.fstik 🇺🇦
  short: |
    Crie stickers e emojis de fotos, vídeos, GIFs. Catálogo e busca de stickers. 🇺🇦
ratelimit: Não tão frequente!
cmd:
  start:
    enter: |
      🧙 Olá, ${name}, eu sou o assistente de pacote de emojis e adesivos.
      Eu posso transformar suas fotos, vídeos, e GIFs em stickers legais com apenas alguns cliques

      Envie o comando /help para saber mais sobre o que posso fazer

      💬 Precisa de ajuda? Junte-se ao nosso chat de suporte em @fStikCommunity (apenas em inglês)
    group: |
      🧙 Olá, ${groupTitle}! Eu sou o mago dos emojis e pacotes de figurinhas.

      Para adicionar uma figurinha a um pacote de grupo, use o comando \/ss em resposta a uma foto, vídeo, gif ou figurinha.
    help: |
      <b>🧙 Bem-vindo! Eu sou seu Mago de Stickers e Emojis</b>

      <b>🎨 Criando Stickers e Pacotes</b>

      /new - Criar um novo pacote
      • Escolha o tipo de pacote: stickers ou emoji
      • Defina um nome para o seu pacote
      • Adicione stickers enviando arquivos de mídia
      • Suporta fotos, vídeos, GIFs em qualquer formato
      • O bot otimiza automaticamente o tamanho e converte os arquivos

      <b>📱 Gerenciamento de Stickers</b>

      /delete - Remover um sticker do pacote
      • Encaminhe o sticker que você deseja excluir
      • Ou envie um sticker do pacote para excluí-lo

      /original - Encontrar sticker original
      • Localize o sticker original criado por este bot
      • Útil para encontrar pacotes similares

      /emoji - Configurar emoji do sticker
      • Altere sugestões de emoji para stickers
      • Adicione múltiplos emojis a um único sticker
      • Formato: 😀,😊,🙂

      /frame - Configurar quadros de vídeo
      • Disponível apenas para stickers de vídeo
      • Tipos de quadro: leve, médio, arredondado, quadrado, círculo
      • Pode ser alterado para todo o pacote

      <b>📁 Gerenciamento de Pacotes</b>

      /packs - Gerencie seus pacotes
      • Lista de todos os seus pacotes
      • Edite, exclua, configure pacotes

      /restore - Restaurar pacote oculto
      • Restaure pacotes que foram ocultados da sua lista
      • Pacotes excluídos permanentemente não podem ser restaurados
      • O pacote reaparecerá na sua lista de /packs

      /copy - Copiar pacotes
      • Crie uma cópia de qualquer pacote
      • Capacidade de modificar a cópia
      • Todos os stickers serão copiados para o novo pacote

      <b>📢 Recursos de Catálogo</b>

      /catalog - Catálogo de pacotes de stickers
      • Navegue por pacotes novos e populares
      • Pesquise por palavras-chave ou tags
      • Avalie pacotes para promover ou rebaixar nas classificações

      /publish - Publicar pacote no catálogo
      • Compartilhe seu pacote com outros usuários
      • Adicione descrição, tags e idiomas
      • Aumente a visibilidade do pacote

      <b>🛠 Recursos Adicionais</b>

      /lang - Alterar idioma do bot

      /donate - Apoie o desenvolvimento
      • Recursos adicionais para doadores
      • Processamento prioritário de arquivos
      • Limites aumentados

      <b>💡 Dicas Pro:</b>
      • O bot converte arquivos automaticamente para o formato necessário
      • Se um sticker não aparecer após a adição - por favor, aguarde
      • Leia as mensagens do bot - elas contêm explicações de erros
      • Use clipes curtos para stickers de vídeo
      • Arquivos PNG funcionam melhor para stickers estáticos

      <b>📮 Suporte e Comunidade:</b>

      💬 Chat de suporte: @fStikCommunity (somente em inglês)
      🧑‍🔧 Contato do desenvolvedor: @ly_oBot
      👨🏻‍💻 Canal do desenvolvedor: @LyBlog

      <b>🔗 Código Aberto:</b>
      GitHub: https://github.com/LyoSU/fStikBot
    catalog: |
