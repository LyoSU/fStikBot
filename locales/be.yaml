    enter: |
      🧙 Вітаю цябе, ${name}! Я чарадзейны бот для стварэння пакаў эмодзі і стыкераў.
      Я ў вокамгненне магу ператварыць фота, відэа і гіфкі ў файныя стыкеры.

      Каб даведацца больш, напішыце /help.

      💬 Чат падтрымкі: @fStikCommunity (дазволена толькі англійская мова)
    group: |
      🧙 Вітаю, ${groupTitle}! Я чараўнік эмодзі і стыкераў.

      Каб дадаць стыкер у групавы пак, адпраўце каманду /ss у адказ на фота, відэа, гіфку або стыкер.
    catalog: |
      <b>😻 Вы можаце знайсці новыя наборы стыкераў у нашым каталозе</b>

      • Націсніце кнопку ніжэй і атрымайце доступ да вялізнага каталога набораў стыкераў на любы густ
      • Шукайце па ключавых словах або праз падрыхтаваныя ўкладкі
      • Не забывайце ацэньваць пакі, каб прасунуць або апусціць рэйтынг пака стыкераў
