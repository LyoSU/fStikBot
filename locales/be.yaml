    За 1 крэдыт можна забусціць адзін пак.

    <b>Буст дае наступныя прывілеі:</b>
    ➖ Няма "<code>${titleSuffix}</code>" у назве пака <i>(не ў спасылцы)</i>
    ➖ Назва да 64 сімвалаў (замест 35)
    ➖ Відэа да 35 секунд
    ➖ Прыярытэтная чарга канвертацыі
    ➖ Некалькі стыкераў адначасова
