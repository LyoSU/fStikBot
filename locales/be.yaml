language_name: '🇧🇾 Беларуская'
name: fStik — Стыкеры і эмодзі
description:
  long: |
    Ствараеце стыкеры і эмодзі з фота, відэа і гіфак без канвертацыі!

    Магчымасці:
    • Простае кіраванне пакамі
    • Відэа-стыкеры і свае эмодзі
    • Загрузка арыгінальных файлаў
    • Ператварэнне стыкера/відэа/гіфкі ў малюнак
    • Каталог стыкераў

    Пошук стыкераў: play.google.com/store/apps/details?id=app.fstik 🇺🇦
  short: |
    Ствараеце стыкеры і эмодзі з фота, відэа, GIF. Каталог і пошук. 🇺🇦
ratelimit: Не так часта!
cmd:
