language_name: '🇹🇷 Türkçe'
name: fStik — Çıkartmalar ve Emoji
description:
  long: |
    Fotoğraf, video ve GIF'lerden manuel dönüştürme olmadan çıkartma ve emoji oluşturun. Her şey otomatik işlenir.

    Özellikler:
    • Paket yönetimi
    • Video çıkartma ve özel emoji
    • Orijinal dosyaları indir
    • Resme dönüştür
    • Çıkartma kataloğu

    Çıkartmaları aramak için: play.google.com/store/apps/details?id=app.fstik 🇺🇦
  short: |
    Fotoğraf, video, GIF'lerden sticker ve emoji oluşturun. Katalog ve arama. 🇺🇦
ratelimit: Pek sık değil!
